blueprint:
  name: Play YouTube Video
  author: luuquangvu
  source_url: https://github.com/luuquangvu/tutorials/blob/dev/play_youtube_video_full_llm.yaml
  description: |-
    # Tool plays YouTube videos on a smart TV or speakers used for Voice Assistant

    ## Blueprint Setup

    ### Required

    - A smart TV or speakers integrated into Home Assistant.
    - Support Android TV, Samsung TV, Apple TV, Chromecast, or Sonos.
    - The **Media extractor** integration must be installed (Built-in integration).
    - A template sensor stores all information about entity aliases needs to be configured in `config/configuration.yaml`; The sensor is required for friendly-name lookup.

    ```
    # File configuration.yaml
    shell_command:
      get_entity_alias: jq '[.data.entities[] | select(.options.conversation.should_expose == true and (.aliases | length > 0)) | {entity_id, aliases}]' ./.storage/core.entity_registry
    template:
      - triggers:
          - trigger: homeassistant
            event: start
          - trigger: event
            event_type: event_template_reloaded
        actions:
          - action: shell_command.get_entity_alias
            response_variable: response
        sensor:
          - name: "Assist: Entity IDs and Aliases"
            unique_id: entity_ids_and_aliases
            icon: mdi:format-list-bulleted
            device_class: timestamp
            state: "{{ now().isoformat() }}"
            attributes:
              entities: "{{ response.stdout }}"
    ```

    ### Optional

    - Adjust the prompts for each field used in the script. The descriptions guide the LLM to provide the correct input.

    ### Note

    - Provide a concise and precise description for the script. This will be utilized by the LLM to understand it should use this script for playing YouTube videos on a smart TV or speakers.
    - Make sure to expose the script to Assist after the script has been saved.
    - Do not alter the default script name.
    - Once the script is created, click the three dots in the top right corner, choose "Edit in YAML," and remove the `description: ...` line to restore the default. This step is important because it helps the LLM better understand the script's purpose.
  domain: script
  homeassistant:
    min_version: 2024.12.0
  input:
    entity_aliases_settings:
      name: Settings for Entity Aliases
      icon: mdi:format-list-bulleted
      description: You can use these settings to configure a template sensor that stores all information about entity aliases.
      input:
        entity_aliases:
          name: Entity Aliases
          selector:
            entity:
              filter:
                - domain: sensor
                  integration: template
    media_player_settings:
      name: Settings for Media Player
      icon: mdi:television
      description: Configure a default smart TV or speakers
      input:
        media_player:
          name: Smart TV/Speakers
          selector:
            entity:
              filter:
                - domain: media_player
    prompt_settings:
      name: Prompt settings for the LLM
      icon: mdi:robot
      description: Finetune the prompts for your specific LLM. Defaults are usually fine.
      collapsed: true
      input:
        media_player_name_prompt:
          name: Media Player Name Prompt
          description: The prompt used by the AI to identify the target media player name
          selector:
            text:
              multiline: true
          default: |-
            Device name (TV/Speakers). Omit if unclear
        media_id_prompt:
          name: Media ID Prompt
          description: The prompt used by the AI to identify the YouTube video ID
          selector:
            text:
              multiline: true
          default: |-
            YouTube video ID
mode: parallel
max_exceeded: silent
description: Plays a specific YouTube video by ID on a TV
variables:
  version: 20260409
fields:
  media_player:
    name: Media Player
    description: !input media_player_name_prompt
    selector:
      text:
  media_id:
    name: Media ID
    description: !input media_id_prompt
    selector:
      text:
    required: true
sequence:
  - variables:
      entity_aliases: !input entity_aliases
      media_id: "{{ media_id | default('') | trim }}"
      media_player_query: "{{ media_player | default('') | trim }}"
      default_media_player: !input media_player
  - alias: Resolve Target Media Player
    variables:
      media_player_entity: >-
        {% if media_player_query %}
          {% set matches = states.media_player | selectattr('attributes.friendly_name', 'eq', media_player_query) | map(attribute='entity_id') | list %}
          {% if matches %}
            {{ matches[0] }}
          {% else %}
            {% set alias_matches = state_attr(entity_aliases, 'entities') | default([]) | selectattr('entity_id', 'match', 'media_player\.') | selectattr('aliases', 'contains', media_player_query) | map(attribute='entity_id') | list %}
            {{ alias_matches[0] if alias_matches else default_media_player }}
          {% endif %}
        {% else %}
          {{ default_media_player }}
        {% endif %}
      media_player_name: "{{ state_attr(media_player_entity, 'friendly_name') | default('the selected device') }}"
  - alias: Check if variables were set correctly
    if:
      - condition: template
        value_template: "{{ (not media_id) or (not media_player_entity) }}"
    then:
      - alias: Set variable for error message
        variables:
          response:
            error: Unable to play the video because the media ID or media player is missing.
      - alias: Stop the script
        stop: Unable to play the video because inputs are invalid.
        response_variable: response
  - action: media_player.turn_on
    target:
      entity_id: "{{ media_player_entity }}"
  - action: media_extractor.play_media
    data:
      media_content_type: url
      media_content_id: "{{ 'https://www.youtube.com/watch?v=' ~ media_id }}"
    target:
      entity_id: "{{ media_player_entity }}"
  - alias: Prepare success response for Assist
    variables:
      response:
        success: >-
          Playing YouTube video {{ media_id }} on {{ media_player_name }}.
  - stop: Finish and return response data
    response_variable: response
